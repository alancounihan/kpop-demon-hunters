<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ K-Pop Demon Hunters ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--dark:#06000f;--card:#ffffff07;--border:#ffffff14;}
body{min-height:100vh;height:100vh;background:var(--dark);color:#fff;font-family:'Poppins',sans-serif;overflow:hidden;}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s,transform .5s;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(18px);}

.logo{font-family:'Cinzel',serif;font-size:2.9rem;font-weight:900;text-align:center;line-height:1.08;
  background:linear-gradient(135deg,#ff00cc,#aa00ff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.06em;}
.sub{font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:.45rem;text-align:center;}
.char-grid{display:flex;gap:1.6rem;margin-top:2rem;}
.char-card{width:188px;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;
  transition:transform .3s,box-shadow .3s,border-color .3s;backdrop-filter:blur(10px);animation:cardIn .55s ease both;}
.char-card:nth-child(1){animation-delay:.08s}.char-card:nth-child(2){animation-delay:.2s}.char-card:nth-child(3){animation-delay:.32s}
@keyframes cardIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.char-card.rumi:hover{transform:translateY(-9px) scale(1.03);border-color:#d500f9;box-shadow:0 22px 55px rgba(170,0,255,.45);}
.char-card.mira:hover{transform:translateY(-9px) scale(1.03);border-color:#ff6d00;box-shadow:0 22px 55px rgba(255,80,0,.42);}
.char-card.zoe:hover {transform:translateY(-9px) scale(1.03);border-color:#00e5ff;box-shadow:0 22px 55px rgba(0,200,255,.42);}
.portrait{display:flex;align-items:center;justify-content:center;height:215px;overflow:hidden;}
.char-info{padding:.8rem 1rem;border-top:1px solid var(--border);}
.c-name{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;letter-spacing:.12em;}
.c-title{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;opacity:.5;margin-top:.18rem;}
.c-desc{font-size:.73rem;opacity:.62;margin-top:.42rem;line-height:1.45;}
.sel-btn{display:block;width:calc(100% - 1.5rem);margin:.65rem .75rem;padding:.5rem;border:none;border-radius:10px;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:.76rem;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:.2s;}
.sel-btn:hover{transform:scale(1.03);filter:brightness(1.1);}
.rumi .sel-btn{background:linear-gradient(135deg,#8e24aa,#d500f9);color:#fff;}
.mira .sel-btn{background:linear-gradient(135deg,#d84315,#ff6d00);color:#fff;}
.zoe  .sel-btn{background:linear-gradient(135deg,#00838f,#00e5ff);color:#111;}

#screen-customize{flex-direction:row;justify-content:center;gap:1.8rem;align-items:center;padding:1rem;}
.disp-area{display:flex;flex-direction:column;align-items:center;gap:.7rem;flex-shrink:0;}
.disp-name{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:700;letter-spacing:.12em;}
.disp-title{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;opacity:.48;}
.disp-box{width:248px;height:375px;background:var(--card);border-radius:22px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;backdrop-filter:blur(10px);position:relative;}
.disp-box::before{content:'';position:absolute;inset:0;border-radius:22px;
  background:radial-gradient(ellipse at 50% 0%,rgba(170,0,255,.1),transparent 65%);pointer-events:none;}
#char-svg{width:208px;height:355px;}
.btn-row{display:flex;gap:.65rem;}
.back-btn{padding:.48rem 1.2rem;background:transparent;border:1px solid rgba(255,255,255,.22);border-radius:50px;
  color:rgba(255,255,255,.55);font-family:'Poppins',sans-serif;cursor:pointer;font-size:.78rem;transition:.2s;}
.back-btn:hover{border-color:rgba(255,255,255,.6);color:#fff;}
.go-btn{padding:.55rem 1.5rem;border:none;border-radius:50px;font-family:'Poppins',sans-serif;font-weight:700;
  font-size:.82rem;cursor:pointer;text-transform:uppercase;letter-spacing:.12em;color:#fff;transition:.2s;}
.go-btn:hover{transform:scale(1.05);filter:brightness(1.15);}
.panel{width:385px;background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;backdrop-filter:blur(12px);flex-shrink:0;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:.82rem .35rem;background:transparent;border:none;color:rgba(255,255,255,.42);
  font-family:'Poppins',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;text-transform:uppercase;
  letter-spacing:.08em;transition:.2s;position:relative;}
.tab.on{color:#fff;}
.tab.on::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:3px;border-radius:3px 3px 0 0;
  background:linear-gradient(90deg,#ff00cc,#aa00ff);}
.tcontent{display:none;padding:1.2rem;}.tcontent.on{display:block;}
.opts{display:grid;grid-template-columns:repeat(5,1fr);gap:.48rem;}
.opt{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:11px;cursor:pointer;
  transition:.2s;font-size:1.5rem;gap:.12rem;padding:.22rem;}
.opt .lb{font-size:.5rem;color:rgba(255,255,255,.58);text-align:center;font-family:'Poppins',sans-serif;font-weight:600;}
.opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35);transform:scale(1.07);}
.opt.on{border-color:#ff00cc;background:rgba(255,0,204,.14);box-shadow:0 0 12px rgba(255,0,204,.3);}
.slbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.42);margin:.95rem 0 .5rem;}
.swatches{display:flex;gap:.42rem;flex-wrap:wrap;}
.sw{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s;}
.sw:hover{transform:scale(1.28);}.sw.on{border-color:#fff;box-shadow:0 0 9px rgba(255,255,255,.55);}

#screen-final{text-align:center;gap:.85rem;}
.final-hd{font-family:'Cinzel',serif;font-size:2.1rem;font-weight:900;
  background:linear-gradient(135deg,#ff00cc,#aa00ff,#00e5ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:pls 2.2s ease infinite;}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.65}}
.final-box{width:265px;height:390px;margin:0 auto;background:var(--card);border-radius:22px;
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 55px rgba(170,0,255,.22);}
#final-svg{width:240px;height:370px;}
.final-q{font-size:.92rem;color:rgba(255,255,255,.58);font-style:italic;max-width:380px;padding:0 1rem;line-height:1.55;}
.again-btn{padding:.72rem 2rem;background:linear-gradient(135deg,#ff00cc,#aa00ff);border:none;border-radius:50px;
  color:#fff;font-family:'Poppins',sans-serif;font-weight:700;cursor:pointer;font-size:.86rem;
  letter-spacing:.1em;text-transform:uppercase;transition:.2s;}
.again-btn:hover{transform:scale(1.06);box-shadow:0 10px 32px rgba(170,0,255,.5);}

@media(max-width:860px){
  .logo{font-size:1.9rem;}.char-grid{gap:.9rem;}.char-card{width:152px;}
  #screen-customize{flex-direction:column;overflow-y:auto;padding-top:1.5rem;}
  .panel{width:96vw;max-width:385px;}.disp-box{width:210px;height:315px;}#char-svg{width:178px;height:300px;}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="ss" class="screen">
  <div class="logo">K-POP<br>DEMON HUNTERS</div>
  <div class="sub">✦ Choose Your Hunter ✦</div>
  <div class="char-grid" id="cgrid"></div>
</div>

<div id="sc" class="screen hidden">
  <div class="disp-area">
    <div style="text-align:center"><div class="disp-name" id="dn"></div><div class="disp-title" id="dt"></div></div>
    <div class="disp-box">
      <svg id="char-svg" viewBox="0 0 200 310" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="btn-row">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <button class="go-btn" id="gobtn" onclick="beginHunt()">Begin the Hunt ⚔️</button>
    </div>
  </div>
  <div class="panel">
    <div class="tabs">
      <button class="tab on" data-t="outfit" onclick="swTab('outfit')">👗 Outfit</button>
      <button class="tab" data-t="hair"   onclick="swTab('hair')">💇 Hair</button>
      <button class="tab" data-t="makeup" onclick="swTab('makeup')">💄 Makeup</button>
    </div>
    <div id="t-outfit" class="tcontent on"><div class="opts" id="o-outfit"></div></div>
    <div id="t-hair"   class="tcontent">
      <div class="opts" id="o-hair"></div>
      <div class="slbl">Hair Colour</div>
      <div class="swatches" id="o-colors"></div>
    </div>
    <div id="t-makeup" class="tcontent"><div class="opts" id="o-makeup"></div></div>
  </div>
</div>

<div id="sf" class="screen hidden">
  <div class="final-hd" id="fhd"></div>
  <div class="final-box"><svg id="final-svg" viewBox="0 0 200 310" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="final-q" id="fq"></div>
  <button class="again-btn" onclick="reset()">✦ Play Again ✦</button>
</div>

<script>
// ═══════════ DATA ═══════════
const CH = {
  rumi:{
    name:'RUMI', title:'Shadow Blade', key:'rumi',
    desc:'Cold and calculated. She strikes from the shadows.',
    skin:'#fde8ef', skinS:'#f9a8c4',
    eye:'#9c27b0', eyeL:'#e040fb',
    hair:'#7b1fa2',        // PURPLE
    defHair:'braid',
    defOutfit:'street',
    lip:'#e91e63', theme:'#9c27b0', themeL:'#e040fb',
    tagline:'"They fear what lurks in the dark… and that is me."',
    bg:['#25004a','#120028']
  },
  zoe:{
    name:'ZOE', title:'Frost Enchanter', key:'zoe',
    desc:'Mysterious and precise. She commands arcane power.',
    skin:'#e8f4f8', skinS:'#90caf9',
    eye:'#006064', eyeL:'#00e5ff',
    hair:'#004d40',        // DARK TEAL
    defHair:'bob',
    defOutfit:'street',
    lip:'#0097a7', theme:'#00838f', themeL:'#00e5ff',
    tagline:'"I speak and the shadows answer. I hunt and demons fall."',
    bg:['#001525','#000c15']
  },
  mira:{
    name:'MIRA', title:'Flame Striker', key:'mira',
    desc:'Bold and fearless. She charges into the heart of battle.',
    skin:'#ffe8d0', skinS:'#ffb74d',
    eye:'#c62828', eyeL:'#ff5722',
    hair:'#c62828',        // RED
    defHair:'long',
    defOutfit:'hunter',
    lip:'#e64a19', theme:'#e64a19', themeL:'#ff8a65',
    tagline:'"Every demon knows my name — and every demon fears it."',
    bg:['#3a0800','#1a0400']
  }
};

const OUTFITS=[{id:'hunter',n:'Hunter',e:'🗡️'},{id:'idol',n:'K-Pop',e:'⭐'},{id:'street',n:'Street',e:'🎮'},{id:'gothic',n:'Gothic',e:'🖤'},{id:'armor',n:'Armor',e:'⚔️'}];
const HAIRS=[{id:'braid',n:'Braid',e:'🔮'},{id:'long',n:'Long',e:'💫'},{id:'bob',n:'Bob',e:'✂️'},{id:'twintails',n:'Tails',e:'🎀'},{id:'updo',n:'Updo',e:'👑'},{id:'wavy',n:'Wavy',e:'🌊'}];
const MKPS=[{id:'natural',n:'Natural',e:'🌸'},{id:'glam',n:'Glam',e:'💄'},{id:'gothic',n:'Gothic',e:'🖤'},{id:'smoky',n:'Smoky',e:'✨'},{id:'kpop',n:'K-Pop',e:'🌟'}];
const HCOLS=[
  {c:'#7b1fa2',l:'Purple'},{c:'#c62828',l:'Red'},{c:'#004d40',l:'Teal'},
  {c:'#1a237e',l:'Navy'},{c:'#e91e63',l:'Pink'},{c:'#ff6f00',l:'Amber'},
  {c:'#1b5e20',l:'Forest'},{c:'#fdd835',l:'Gold'},{c:'#4a148c',l:'Dark Purple'},
  {c:'#880e4f',l:'Magenta'},{c:'#eceff1',l:'White'},{c:'#212121',l:'Black'},
  {c:'#00838f',l:'Cyan'},{c:'#bf360c',l:'Burnt'},{c:'#5c6bc0',l:'Indigo'}
];

let S={char:null,hair:'long',hairColor:null,outfit:'hunter',makeup:'natural'};

window.onload=()=>{initBG();buildSelect();buildUI();};

// ═══════════ PARTICLE BG ═══════════
function initBG(){
  const cv=document.getElementById('bg'),cx=cv.getContext('2d');
  let W=cv.width=innerWidth,H=cv.height=innerHeight;
  window.addEventListener('resize',()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;});
  const stars=Array.from({length:140},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,spd:Math.random()*.22+.07,a:Math.random()*.75+.18,t:Math.random()*Math.PI*2}));
  const orbs=[{x:W*.18,y:H*.28,r:95,col:'rgba(150,0,240,.07)',dx:.3,dy:.2},{x:W*.78,y:H*.62,r:115,col:'rgba(255,0,180,.055)',dx:-.22,dy:.28},{x:W*.5,y:H*.88,r:85,col:'rgba(0,200,255,.06)',dx:.18,dy:-.2}];
  (function loop(){
    cx.clearRect(0,0,W,H);
    const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
    g.addColorStop(0,'#0f0022');g.addColorStop(1,'#020008');
    cx.fillStyle=g;cx.fillRect(0,0,W,H);
    orbs.forEach(o=>{
      o.x+=o.dx;o.y+=o.dy;
      if(o.x<-o.r||o.x>W+o.r)o.dx*=-1;if(o.y<-o.r||o.y>H+o.r)o.dy*=-1;
      const og=cx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      og.addColorStop(0,o.col);og.addColorStop(1,'transparent');
      cx.fillStyle=og;cx.beginPath();cx.arc(o.x,o.y,o.r,0,Math.PI*2);cx.fill();
    });
    stars.forEach(s=>{
      s.t+=.02;s.y-=s.spd;if(s.y<0){s.y=H;s.x=Math.random()*W;}
      cx.fillStyle=`rgba(255,255,255,${s.a*(.5+.5*Math.sin(s.t))})`;
      cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
    });
    requestAnimationFrame(loop);
  })();
}

// ═══════════ SELECT SCREEN ═══════════
function buildSelect(){
  const g=document.getElementById('cgrid');
  Object.entries(CH).forEach(([k,c])=>{
    const d=document.createElement('div');d.className=`char-card ${k}`;
    d.innerHTML=`<div class="portrait" style="background:linear-gradient(160deg,${c.bg[0]},${c.bg[1]})">
      <svg viewBox="0 0 200 230" style="height:200px" xmlns="http://www.w3.org/2000/svg">
        ${buildSVG(c,c.defHair,c.hair,c.defOutfit,'natural',k)}
      </svg></div>
    <div class="char-info">
      <div class="c-name" style="color:${c.themeL}">${c.name}</div>
      <div class="c-title">${c.title}</div>
      <div class="c-desc">${c.desc}</div>
    </div>
    <button class="sel-btn" onclick="pick('${k}')">Choose ${c.name}</button>`;
    g.appendChild(d);
  });
}

// ═══════════ CUSTOMIZE UI ═══════════
function buildUI(){
  buildOpts('o-outfit',OUTFITS,'outfit');
  buildOpts('o-hair',HAIRS,'hair');
  buildOpts('o-makeup',MKPS,'makeup');
  const sc=document.getElementById('o-colors');
  HCOLS.forEach(hc=>{
    const s=document.createElement('div');s.className='sw';s.style.background=hc.c;s.title=hc.l;
    s.onclick=()=>{S.hairColor=hc.c;document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));s.classList.add('on');refreshChar();};
    sc.appendChild(s);
  });
}
function buildOpts(cid,arr,key){
  const el=document.getElementById(cid);
  arr.forEach(item=>{
    const btn=document.createElement('button');btn.className='opt';btn.dataset.v=item.id;
    btn.innerHTML=`<span style="font-size:1.42rem">${item.e}</span><span class="lb">${item.n}</span>`;
    btn.onclick=()=>{S[key]=item.id;el.querySelectorAll('.opt').forEach(b=>b.classList.toggle('on',b.dataset.v===item.id));refreshChar();};
    el.appendChild(btn);
  });
}
function swTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.querySelectorAll('.tcontent').forEach(c=>c.classList.remove('on'));
  document.getElementById(`t-${t}`).classList.add('on');
}

// ═══════════ NAVIGATION ═══════════
function pick(k){
  const c=CH[k];
  S={char:k,hair:c.defHair,hairColor:c.hair,outfit:c.defOutfit,makeup:'natural'};
  document.getElementById('dn').textContent=c.name;document.getElementById('dn').style.color=c.themeL;
  document.getElementById('dt').textContent=c.title;
  document.getElementById('gobtn').style.background=`linear-gradient(135deg,${c.theme},${c.themeL})`;
  document.querySelectorAll('.opt').forEach(b=>{
    const gr=b.closest('.opts').id;
    const t=gr==='o-outfit'?c.defOutfit:gr==='o-hair'?c.defHair:'natural';
    b.classList.toggle('on',b.dataset.v===t);
  });
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  refreshChar();show('sc');
}
function goBack(){show('ss');}
function reset(){show('ss');}
function beginHunt(){
  const c=CH[S.char];
  document.getElementById('fhd').textContent=`${c.name} IS READY`;
  document.getElementById('fq').textContent=c.tagline;
  document.getElementById('final-svg').innerHTML=buildSVG(c,S.hair,S.hairColor||c.hair,S.outfit,S.makeup,S.char);
  show('sf');
}
function refreshChar(){
  const c=CH[S.char];
  document.getElementById('char-svg').innerHTML=buildSVG(c,S.hair,S.hairColor||c.hair,S.outfit,S.makeup,S.char);
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

// ═══════════ OUTFIT COLOURS ═══════════
function getOC(outfit,charKey){
  // Character signature looks
  if(outfit==='street'&&charKey==='rumi') return{m:'#f9a825',a:'#fff9c4',s:'#f57f17',d:'#fff',p:'#1a1a3e'};
  if(outfit==='street'&&charKey==='zoe')  return{m:'#00838f',a:'#80deea',s:'#005662',d:'#e0f7fa',p:'#00838f'};
  if(outfit==='hunter'&&charKey==='mira') return{m:'#1a1a3e',a:'#ff6f00',s:'#0d0d2b',d:'#ffd740',p:'#ff6f00'};
  return{
    hunter:{m:'#161630',a:'#7c4dff',s:'#0d0d2b',d:'#b39ddb',p:'#4a148c'},
    idol:  {m:'#e91e63',a:'#ffd740',s:'#880e4f',d:'#fff9c4',p:'#f50057'},
    street:{m:'#263238',a:'#80deea',s:'#1c313a',d:'#e0f7fa',p:'#00acc1'},
    gothic:{m:'#12001e',a:'#aa00ff',s:'#2d0040',d:'#e1bee7',p:'#6a0080'},
    armor: {m:'#37474f',a:'#80cbc4',s:'#1c313a',d:'#cfd8dc',p:'#00897b'}
  }[outfit]||{m:'#161630',a:'#7c4dff',s:'#0d0d2b',d:'#b39ddb',p:'#4a148c'};
}

// ═══════════ MAIN SVG BUILDER ═══════════
let _uid=0;
function buildSVG(c,hStyle,hColor,outfit,makeup,charKey){
  const uid=`u${++_uid}`;
  const hl=ltn(hColor,50), hd=dkn(hColor,30);
  const OC=getOC(outfit,charKey);
  const MC={
    natural:{lid:'rgba(255,200,210,.2)',lip:c.lip,blush:'rgba(255,140,160,.3)',liner:'#0a0014'},
    glam:  {lid:'rgba(210,160,20,.5)', lip:'#b71c1c',blush:'rgba(230,60,60,.42)',liner:'#050008'},
    gothic:{lid:'rgba(80,0,110,.68)',  lip:'#38006b',blush:'rgba(70,0,90,.2)',   liner:'#12001e'},
    smoky: {lid:'rgba(20,20,45,.7)',   lip:'#9e9e9e',blush:'rgba(90,90,105,.2)', liner:'#000'},
    kpop:  {lid:'rgba(255,70,190,.48)',lip:'#ff4081',blush:'rgba(255,80,195,.48)',liner:'#0a0014'}
  }[makeup]||{lid:'rgba(255,200,210,.2)',lip:c.lip,blush:'rgba(255,140,160,.3)',liner:'#0a0014'};

  // SVG defs
  let s=`<defs>
    <radialGradient id="fg${uid}" cx="45%" cy="28%" r="72%">
      <stop offset="0%" stop-color="${ltn(c.skin,10)}"/>
      <stop offset="100%" stop-color="${c.skinS}"/>
    </radialGradient>
    <filter id="gw${uid}" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sw${uid}" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // Draw order: hair back → outfit → neck → head → face → hair front+braid → extras
  s += drawHairBack(hStyle, hColor, hl, hd);
  s += drawOutfit(OC, c, outfit, uid);
  // Neck
  s += `<rect x="90" y="153" width="20" height="18" rx="4" fill="url(#fg${uid})" stroke="${c.skinS}" stroke-width="1"/>`;
  // Head (big chibi)
  s += `<ellipse cx="100" cy="90" rx="58" ry="63" fill="url(#fg${uid})" stroke="${dkn(c.skin,8)}" stroke-width="1.5"/>`;
  // Chin shading
  s += `<ellipse cx="100" cy="143" rx="38" ry="14" fill="${c.skinS}" opacity=".25"/>`;
  // Ears
  s += `<ellipse cx="44" cy="93" rx="8" ry="11" fill="url(#fg${uid})" stroke="${c.skinS}" stroke-width="1"/>`;
  s += `<ellipse cx="156" cy="93" rx="8" ry="11" fill="url(#fg${uid})" stroke="${c.skinS}" stroke-width="1"/>`;
  s += `<ellipse cx="44" cy="93" rx="5" ry="8" fill="${c.skinS}" opacity=".4"/>`;
  s += `<ellipse cx="156" cy="93" rx="5" ry="8" fill="${c.skinS}" opacity=".4"/>`;
  // Earring for Rumi
  if(charKey==='rumi') s += `<ellipse cx="44" cy="107" rx="5" ry="7" fill="none" stroke="#fdd835" stroke-width="2.2"/><circle cx="44" cy="115" r="2.2" fill="#fdd835"/>`;
  // Blush
  s += `<ellipse cx="67" cy="114" rx="17" ry="9" fill="${MC.blush}"/>`;
  s += `<ellipse cx="133" cy="114" rx="17" ry="9" fill="${MC.blush}"/>`;
  // Eyes
  s += drawEyes(c, MC, uid);
  // Brows
  s += drawBrows(hColor, makeup, MC.liner);
  // Nose
  s += `<path d="M97 125 Q100 128 103 125" fill="none" stroke="${dkn(c.skin,18)}" stroke-width="1.8" stroke-linecap="round"/>`;
  // Lips
  s += drawLips(MC.lip, makeup);
  // Makeup FX
  s += mkFX(MC, makeup);
  // Hair front (bangs + style-specific front elements + braid on top)
  s += drawHairFront(hStyle, hColor, hl, hd, charKey);
  // Weapon + floating stars
  s += drawExtras(c, OC, outfit, charKey, uid);
  return s;
}

// ═══════════ HAIR BACK ═══════════

    h+=`<rect x="144" y="88" width="38" height="${st==='bob'?90:220}" rx="19" fill="${col}" stroke="${hd}" stroke-width="1"/>`;

      h+=`<path d="M18 120 Q10 162 18 200 Q12 242 20 275" stroke="${hl}" stroke-width="6" fill="none" opacity=".15" stroke-linecap="round"/>`;

// ═══════════ EYES ═══════════
function drawEyes(c, MC, uid){
  let e='';
  [[76,100],[124,100]].forEach(([cx,cy],i)=>{
    const flip=i===0;
    // White sclera with bold outline
    e+=`<ellipse cx="${cx}" cy="${cy}" rx="19" ry="17" fill="white" stroke="${MC.liner}" stroke-width="2.2"/>`;
    // Flat color iris (matches reference image style)
    e+=`<circle cx="${cx}" cy="${cy+1}" r="13" fill="${c.eye}"/>`;
    // Pupil
    e+=`<circle cx="${cx}" cy="${cy+1}" r="8" fill="#030006"/>`;
    // Main shine (large, top-right quadrant)
    e+=`<circle cx="${cx+5}" cy="${cy-5}" r="4.5" fill="white" opacity=".95"/>`;
    // Small secondary shine
    e+=`<circle cx="${cx-4}" cy="${cy+4}" r="2" fill="white" opacity=".55"/>`;
    // Bold top lash line
    e+=`<path d="M${cx-19} ${cy-8} Q${cx} ${cy-14} ${cx+19} ${cy-8}" stroke="${MC.liner}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    // Wing flick
    if(flip) e+=`<path d="M${cx-19} ${cy-8} Q${cx-24} ${cy-14} ${cx-27} ${cy-18}" stroke="${MC.liner}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
    else      e+=`<path d="M${cx+19} ${cy-8} Q${cx+24} ${cy-14} ${cx+27} ${cy-18}" stroke="${MC.liner}" stroke-width="2.2" fill="none" stroke-linecap="round"/>`;
    // Lid color shadow
    e+=`<ellipse cx="${cx}" cy="${cy-9}" rx="15" ry="6" fill="${MC.lid}"/>`;
    // Bottom lash (thin)
    e+=`<path d="M${cx-13} ${cy+9} Q${cx} ${cy+13} ${cx+13} ${cy+9}" stroke="${MC.liner}" stroke-width="1" fill="none" opacity=".4"/>`;
  });
  return e;
}

// ═══════════ BROWS ═══════════

}

// ═══════════ EXTRAS (weapons + stars) ═══════════

    x+=`<circle cx="21" cy="276" r="12" fill="${c.themeL}" opacity=".12" filter="url(#gw${uid})"/>`;

  if(charKey==='mira'){

    x+=`<ellipse cx="172" cy="244" rx="7" ry="10" fill="${OC.a}" filter="url(#gw${uid})"/>`;
    x+=`<ellipse cx="172" cy="244" rx="4" ry="6" fill="white" opacity=".4"/>`;
    x+=`<circle cx="176" cy="268" r="10" fill="${OC.a}" opacity=".15" filter="url(#gw${uid})"/>`;

  if(charKey==='rumi'&&(outfit==='hunter'||outfit==='street')){

    x+=`<line x1="174" y1="265" x2="178" y2="300" stroke="${c.themeL}" stroke-width="3" stroke-linecap="round" filter="url(#sw${uid})" opacity=".7"/>`;

      x+=`<rect x="175" y="283" width="12" height="5" rx="2.5" fill="${OC.d}" opacity=".9"/>`;

      x+=`<circle cx="182" cy="252" r="8" fill="#b71c1c"/>`;

  // Floating stars (match reference image aesthetic)

  ];
  starDefs.forEach(sd=>{
    x+=`<text x="${sd.x}" y="${sd.y}" font-size="${sd.size}" fill="${sd.col}" opacity=".7" transform="rotate(${sd.rot},${sd.x+sd.size/2},${sd.y-sd.size/2})" filter="url(#sw${uid})">★</text>`;

  return x;

// ═══════════ UTILITIES ═══════════
function ltn(hex,amt){
  if(!hex||hex[0]!=='#')return'#fff';
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function dkn(hex,amt){
  if(!hex||hex[0]!=='#')return'#000';
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}
